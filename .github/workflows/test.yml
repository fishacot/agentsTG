name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install httpx pydantic pydantic-settings pytest pytest-asyncio pytest-cov \
            langgraph langchain langchain-core python-dotenv aiogram redis sqlalchemy asyncpg

      - name: Lint
        run: python -m pip install flake8 && python -m flake8 src/ tests/

      - name: Test
        run: pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Alembic migration chain
        run: python -m pip install alembic && python -m alembic heads
